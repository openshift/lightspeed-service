---
llm_providers:
  - name: p1
    type: openai
    url: "https://url1"
    credentials_path: tests/config/secret/apitoken
    models:
      - name: m1
        url: "https://murl1"
        credentials_path: tests/config/secret/apitoken
        context_window_size: 8000
        parameters:
          max_tokens_for_response: 100
      - name: m2
        url: "https://murl2"

ols_config:
  conversation_cache:
    type: memory
    memory:
      max_entries: 100
  logging_config:
    app_log_level: info
  default_provider: p1
  default_model: m1

a2a_agents:
  - name: mock-file-auth
    url: http://localhost:14000
    headers:
      Authorization: tests/config/mcp_test_token.txt
  - name: mock-client-auth
    url: http://localhost:14001
    headers:
      Authorization: client

dev_config:
  disable_auth: true
  enable_dev_ui: false
  disable_tls: true
