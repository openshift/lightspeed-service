---
llm_providers:
  - name: openai
    url: "https://api.openai.com/v1"
    credentials_path: tests/config/secret/apitoken
    models:
      - name: model-name
ols_config:
  reference_content:
    indexes:
      - product_docs_index_path: "tests/config"
        product_docs_index_id: product
  conversation_cache:
    type: memory
    memory:
      max_entries: 1000
  logging_config:
    logging_level: INFO
  default_provider: openai
  default_model: model-name
  query_filters:
    []
dev_config:
  disable_auth: true
  disable_tls: true
