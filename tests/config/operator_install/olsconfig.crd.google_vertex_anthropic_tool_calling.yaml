apiVersion: ols.openshift.io/v1alpha1
kind: OLSConfig
metadata:
  name: cluster
  labels:
    app.kubernetes.io/created-by: lightspeed-operator
    app.kubernetes.io/instance: olsconfig-sample
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: olsconfig
    app.kubernetes.io/part-of: lightspeed-operator
spec:
  llm:
    providers:
      - credentialsSecretRef:
          name: llmcreds
        models:
          - name: claude-opus-4-6
        name: google_vertex_anthropic
        type: google_vertex_anthropic
        googleVertexAnthropicConfig:
          projectID: "openshift-lightspeed-tests"
          location: "global"
        url: https://aiplatform.googleapis.com/
  ols:
    defaultModel: claude-opus-4-6
    defaultProvider: google_vertex_anthropic
    deployment:
      replicas: 1
    disableAuth: false
    logLevel: DEBUG
    queryFilters:
      - name: foo_filter
        pattern: '\b(?:foo)\b'
        replaceWith: "deployment"
      - name: bar_filter
        pattern: '\b(?:bar)\b'
        replaceWith: "openshift"
    introspectionEnabled: true
    userDataCollection:  # disable user collection for this test suite
      feedbackDisabled: true
      transcriptsDisabled: true
