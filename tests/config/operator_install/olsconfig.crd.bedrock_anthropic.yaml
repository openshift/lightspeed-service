apiVersion: ols.openshift.io/v1alpha1
kind: OLSConfig
metadata:
  name: cluster
  labels:
    app.kubernetes.io/created-by: lightspeed-operator
    app.kubernetes.io/instance: olsconfig-sample
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: olsconfig
    app.kubernetes.io/part-of: lightspeed-operator
spec:
  llm:
    providers:
      - name: bedrock
        type: bedrock
        url: "https://bedrock-mantle.us-east-1.api.aws"
        credentialsSecretRef:
          name: llmcreds
        models:
          - name: anthropic.claude-sonnet-4-6
  ols:
    defaultModel: anthropic.claude-sonnet-4-6
    defaultProvider: bedrock
    deployment:
      replicas: 1
    disableAuth: false
    logLevel: DEBUG
    queryFilters:
      - name: foo_filter
        pattern: '\b(?:foo)\b'
        replaceWith: "deployment"
      - name: bar_filter
        pattern: '\b(?:bar)\b'
        replaceWith: "openshift"
    userDataCollection:
      feedbackDisabled: true
      transcriptsDisabled: true
