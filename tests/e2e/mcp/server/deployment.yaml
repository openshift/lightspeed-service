apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-mock-server
  namespace: openshift-lightspeed
  labels:
    app: mcp-mock-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-mock-server
  template:
    metadata:
      labels:
        app: mcp-mock-server
    spec:
      containers:
        - name: mcp-mock-server
          image: quay.io/openshift-lightspeed/ols-qe:test-mcp-server
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-mock-server
  namespace: openshift-lightspeed
  labels:
    app: mcp-mock-server
spec:
  selector:
    app: mcp-mock-server
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
