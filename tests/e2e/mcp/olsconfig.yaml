# OLS config for MCP e2e tests.
# Requires:
#   - Mock MCP server running on port 3000
#   - Real LLM API key in /tmp/test-openai-key
#   - Token file: echo "Bearer test-secret-token-123" > /tmp/mcp-test-token
#   - K8s mock MCP header file: echo "Bearer k8s-mock-pod-logs-token" > /tmp/mcp-k8s-test-token
---
llm_providers:
  - name: test_provider
    type: openai
    url: "https://api.openai.com/v1"
    credentials_path: /tmp/test-openai-key
    models:
      - name: gpt-4o-mini

ols_config:
  conversation_cache:
    type: memory
    memory:
      max_entries: 100
  logging_config:
    app_log_level: info
  default_provider: test_provider
  default_model: gpt-4o-mini
  query_validation_method: disabled

  authentication_config:
    module: noop-with-token

  tools_approval:
    approval_type: tool_annotations
    approval_timeout: 5

  tool_filtering:
    embed_model_path: "sentence-transformers/all-MiniLM-L6-v2"
    alpha: 0.5
    top_k: 5
    threshold: 0.01

mcp_servers:
  - name: mock-file-auth
    url: http://localhost:3000
    headers:
      Authorization: /tmp/mcp-test-token

  - name: mock-k8s-auth
    url: http://localhost:3000
    headers:
      Authorization: /tmp/mcp-k8s-test-token

  - name: mock-client-auth
    url: http://localhost:3000
    headers:
      Authorization: client

  - name: mock-bad-url
    url: http://localhost:19999

dev_config:
  disable_auth: true
  enable_dev_ui: false
  disable_tls: true
