llm_providers:
  - name: my_bam
    type: bam
    credentials_path: bam_api_key.txt
    models:
      - name: ibm/granite-13b-chat-v2
ols_config:
  user_data_collection:
    feedback_disabled: false
    feedback_storage: "/app-root/data/feedback/"
  conversation_cache:
    type: memory
    memory:
      max_entries: 1000
  logger_config:
    default_level: DEBUG
  default_provider: my_bam
  default_model: ibm/granite-13b-chat-v2
dev_config:
  disable_auth: true
  disable_tls: true
