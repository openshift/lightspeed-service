apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  namespace: bookinfo
  name: reviews
  labels:
    gevals.kiali.io/test: gevals-testing
  annotations: ~
spec:
  host: reviews.bookinfo.svc.cluster.local
  subsets:
  - name: v1
    labels:
      version: v1
  - name: v2
    labels:
      version: v2
  - name: v3
    labels:
      version: v3
  trafficPolicy: ~
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  namespace: bookinfo
  name: reviews
  labels:
    gevals.kiali.io/test: gevals-testing
spec:
  http:
  - route:
    - destination:
        host: reviews.bookinfo.svc.cluster.local
        subset: v1
      weight: 50
    - destination:
        host: reviews.bookinfo.svc.cluster.local
        subset: v2
      weight: 50
    - destination:
        host: reviews.bookinfo.svc.cluster.local
        subset: v3
      weight: 0
  hosts:
  - reviews.bookinfo.svc.cluster.local
  gateways: ~          