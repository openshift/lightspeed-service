# HTTP server with artificial delay on responses (FlowRTT); client polls continuously.
apiVersion: v1
kind: Namespace
metadata:
  name: netobserv-eval-tcp-rtt
  labels:
    purpose: netobserv-eval
    netobserv.openshift.io/eval-scenario: tcp-rtt
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: slow-http-server
  namespace: netobserv-eval-tcp-rtt
spec:
  replicas: 1
  selector:
    matchLabels:
      app: slow-http-server
  template:
    metadata:
      labels:
        app: slow-http-server
        netobserv.openshift.io/eval-scenario: tcp-rtt
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: server
          image: python:3.12-alpine
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop: ["ALL"]
          command: ["/bin/sh", "-c"]
          args:
            - |
              cat >/tmp/server.py <<'PY'
              import time
              from http.server import BaseHTTPRequestHandler, HTTPServer
              class H(BaseHTTPRequestHandler):
                  def do_GET(self):
                      time.sleep(0.35)
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b"slow\n")
                  def log_message(self, *a): pass
              HTTPServer(("0.0.0.0", 8080), H).serve_forever()
              PY
              exec python /tmp/server.py
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: slow-http-server
  namespace: netobserv-eval-tcp-rtt
spec:
  selector:
    app: slow-http-server
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rtt-client
  namespace: netobserv-eval-tcp-rtt
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rtt-client
  template:
    metadata:
      labels:
        app: rtt-client
        netobserv.openshift.io/eval-scenario: tcp-rtt
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: client
          image: busybox:1.36.1@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop: ["ALL"]
          command: ["/bin/sh", "-c"]
          args:
            - |
              while true; do
                start=$(date +%s)
                if wget -q -O- -T 10 http://slow-http-server:8080/; then
                  end=$(date +%s)
                  echo "OK round-trip $((end - start))s (expect elevated RTT)"
                else
                  echo "ERROR: request failed"
                fi
                sleep 3
              done
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
