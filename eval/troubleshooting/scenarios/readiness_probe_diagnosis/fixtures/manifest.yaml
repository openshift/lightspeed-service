apiVersion: v1
kind: Namespace
metadata:
  name: discovery-hub
  labels:
    purpose: eval-test
---
apiVersion: v1
kind: Pod
metadata:
  name: catalog-index-service
  namespace: discovery-hub
  labels:
    app: catalog-index-service
    tier: indexing
  annotations:
    eval/scenario: readiness-probe-diagnosis
spec:
  containers:
  - name: indexer
    image: busybox:1.36
    command: ["sh", "-c", "while true; do echo 'Running...'; sleep 5; done"]
    ports:
    - containerPort: 9200
      name: health
    readinessProbe:
      httpGet:
        path: /healthz
        port: 9200
      initialDelaySeconds: 2
      periodSeconds: 4
      failureThreshold: 2
    resources:
      requests:
        cpu: "5m"
        memory: "32Mi"
      limits:
        memory: "64Mi"
