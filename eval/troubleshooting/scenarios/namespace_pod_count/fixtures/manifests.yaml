apiVersion: v1
kind: Namespace
metadata:
  name: fleet-alpha
---
apiVersion: v1
kind: Namespace
metadata:
  name: fleet-alpha1
---
# --- fleet-alpha: 6 workloads (mix of Pods and Deployments) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dispatcher-north
  namespace: fleet-alpha
spec:
  replicas: 1
  selector:
    matchLabels:
      unit: dispatcher-north
  template:
    metadata:
      labels:
        unit: dispatcher-north
    spec:
      containers:
        - name: runner
          image: nginxinc/nginx-unprivileged:alpine
          resources:
            requests:
              cpu: "5m"
              memory: "16Mi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
