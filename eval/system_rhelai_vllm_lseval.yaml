# LightSpeed Evaluation Framework Configuration
# OLS Provider: RHEL AI vLLM (model being evaluated)
# Judge LLM: OpenAI GPT-4.1-mini (scoring responses)
#
# The default model "gpt-3.5-turbo" is the alias registered in the vLLM deployment.
# Override it for your deployment via the LSEVAL_OLS_MODEL environment variable, e.g.:
#   export LSEVAL_OLS_MODEL=ibm/granite-3.1-8b-instruct

# Judge LLM Configuration
# Requires OPENAI_API_KEY environment variable.
llm:
  provider: "openai"
  model: "gpt-4.1-mini"
  temperature: 0.0
  max_tokens: 512
  timeout: 300
  num_retries: 3

# OLS API Configuration
# Targets the OLS /query endpoint using RHEL AI vLLM as the backend LLM.
# api_base is overridden at runtime with the actual OLS service URL.
# Requires OLS to be configured with an rhelai_vllm provider (vLLM endpoint + token in olsconfig).
# Set LSEVAL_OLS_MODEL to the model alias deployed in your vLLM instance.
api:
  enabled: true
  api_base: http://localhost:8080
  endpoint_type: query
  timeout: 300
  provider: "rhelai_vllm"
  model: "gpt-3.5-turbo"
  no_tools: null
  system_prompt: null

# Metrics evaluated per conversation turn
metrics_metadata:
  turn_level:
    "custom:answer_correctness":
      # threshold intentionally omitted: no agreed baseline yet.
      # Scores are recorded to track the trend over time; a threshold
      # will be introduced once the average trend is established.
      description: "Correctness vs expected answer using custom LLM evaluation"
      default: true

# Output Configuration
output:
  output_dir: "./eval_output"
  base_filename: "evaluation"
  enabled_outputs:
    - csv
    - json

  csv_columns:
    - "conversation_group_id"
    - "turn_id"
    - "metric_identifier"
    - "score"
    - "threshold"
    - "result"
    - "reason"
    - "query"
    - "response"
    - "execution_time"

# Visualization settings
visualization:
  figsize: [12, 8]
  dpi: 300
  enabled_graphs:
    - "score_distribution"
    - "status_breakdown"

# Environment Variables
environment:
  DEEPEVAL_TELEMETRY_OPT_OUT: "YES"
  DEEPEVAL_DISABLE_PROGRESS_BAR: "YES"
  LITELLM_LOG: ERROR

# Logging Configuration
logging:
  source_level: INFO
  package_level: ERROR
  log_format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  show_timestamps: true
  package_overrides:
    httpx: ERROR
    urllib3: ERROR
    requests: ERROR
    matplotlib: ERROR
    LiteLLM: WARNING
    DeepEval: WARNING
    ragas: WARNING
